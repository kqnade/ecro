name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0

      - name: Cache Cargo
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/ecro-core/target/
          key: ${{ runner.os }}-${{ runner.arch }}-cargo-${{ hashFiles('rust/ecro-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-cargo-

      - name: Cache Clojure deps
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-${{ runner.arch }}-clojure-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-clojure-

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Build native image
        run: ./script/build-native.sh

      - name: Package binary
        run: |
          chmod +x ./ecro
          tar -czf "ecro-${{ github.ref_name }}-${{ runner.os }}-${{ runner.arch }}.tar.gz" ./ecro

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ecro-${{ runner.os }}-${{ runner.arch }}
          path: ecro-${{ github.ref_name }}-${{ runner.os }}-${{ runner.arch }}.tar.gz

  release:
    needs: build-native
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@7c4723f7a335432393329f8f1c564994ce50185d # v3
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
