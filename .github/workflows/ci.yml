name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/ecro-core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/ecro-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Rust
        working-directory: rust/ecro-core
        run: cargo build --release

      - name: Test Rust
        working-directory: rust/ecro-core
        env:
          COLUMNS: 80
          LINES: 24
        run: cargo test

      - name: Lint Rust
        working-directory: rust/ecro-core
        run: cargo clippy -- -D warnings

      - name: Check Rust formatting
        working-directory: rust/ecro-core
        run: cargo fmt --check

  clojure:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v7

      - name: Install Clojure
        uses: DeLaGuardo/setup-clojure@13.6.1
        with:
          cli: 1.12.5.1654

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/ecro-core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/ecro-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Rust
        working-directory: rust/ecro-core
        run: cargo build --release

      - name: Cache Clojure deps
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-clojure-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Test Clojure
        env:
          COLUMNS: 80
          LINES: 24
        run: clojure -M:test

      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: false

      - name: Install cljstyle
        run: mise install cljstyle

      - name: Check Clojure formatting
        run: cljstyle check

  native-image:
    runs-on: ubuntu-latest
    needs: [rust, clojure]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7

      - name: Install mise
        uses: jdx/mise-action@v4

      - name: Cache Cargo
        uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            rust/ecro-core/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/ecro-core/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Clojure deps
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-clojure-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - name: Install cbindgen
        run: cargo install cbindgen

      - name: Build native image
        run: ./script/build-native.sh

      - name: Upload native binary
        uses: actions/upload-artifact@v5
        with:
          name: ecro-linux-x86_64
          path: ./ecro
